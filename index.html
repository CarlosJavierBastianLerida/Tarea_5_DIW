<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea 5 de DIW Regreso al Futuro</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <a href="#main-content" class="skip-link" id="skip-main">Saltar al contenido principal</a>
    <a href="#video-section" class="skip-link" id="skip-video">Saltar directamente al video</a>
    <a href="#page-footer" class="skip-link" id="skip-footer">Saltar al pie de página</a>
    <header>
        <h1>Escena de Regreso al Futuro</h1>

        <nav aria-label="Menú principal">
            <ul class="nav-list">
                <li><a href="#video-section">Video</a></li>
                <li><a href="#descripcion">Descripción</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <section aria-labelledby="video-titulo" id="video-section">
            <h2 id="video-titulo">Regreso al Futuro</h2>
            <video controls poster="video/Portada_video.png" width="640" height="360">
                <source src="video/video.mp4" type="video/mp4">
                
                <!-- Pistas de subtítulos en formato VTT -->
                <track src="video/subtitulos_en.vtt" kind="subtitles" srclang="en" label="English (VTT)">
                <track src="video/subtitulos_es.vtt" kind="subtitles" srclang="es" label="Español (VTT)">

                <!-- AUDIODESCRIPCIÓN incluida con kind="descriptions" para su lectura en navegadores especiales -->
                <track src="video/audiodescripcion.vtt" kind="descriptions" srclang="es" label="Audiodescripción">
                Tu navegador no soporta la reproducción de video.
            </video>
            <div id="descripcion">
                <p>Esta es una escena mítica de Regreso al Futuro en español.
                    <a href="https://www.youtube.com/watch?v=TxX6OMUxGBc">Youtube</a>.
                </p>
            </div>
        </section>
    </main>

    <footer id="page-footer">
        <p>&copy; 2026 - Carlos Javier Bastian Lérida</p>
    </footer>
</body>

</html>
